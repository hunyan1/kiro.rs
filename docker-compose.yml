services:
  kiro-rs:
    # 默认使用 Docker Hub 镜像
    image: hunyan/kiro.rs:${IMAGE_TAG:-latest}

    # 备选：GHCR（与 Docker Hub 同步发布）
    # image: ghcr.io/hunyan1/kiro.rs:${IMAGE_TAG:-latest}

    # 备选：国内镜像（拉不到 ghcr.io 时使用）
    # image: ghcr.nju.edu.cn/hunyan1/kiro.rs:${IMAGE_TAG:-latest}

    container_name: kiro-rs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8990:8990"
    volumes:
      - ./config/:/app/config/
    restart: unless-stopped
